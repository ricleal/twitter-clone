services:
  postgres:
    image: postgres:18-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - pgdata

  migrate:
    image: migrate/migrate:latest
    restart: on-failure
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pgdata

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - API_PORT=${API_PORT}
    restart: on-failure
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_URL: postgres://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      LOG_LEVEL: ${LOG_LEVEL}
      API_PORT: ${API_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - pgdata

  curl:
    image: badouralix/curl-jq:alpine
    restart: "no"
    environment:
      API_PORT: ${API_PORT}
      HOSTNAME: api
    volumes:
      - ./e2e:/e2e:ro
    depends_on:
      api:
        condition: service_healthy
    command: /bin/sh -c "/e2e/test.sh"
    networks:
      - pgdata

  wait:
    image: busybox:latest
    restart: "no"
    depends_on:
      curl:
        condition: service_completed_successfully
    command: /bin/sh -c "echo 'All tests run!'"
    networks:
      - pgdata

networks:
  pgdata:
    driver: bridge
