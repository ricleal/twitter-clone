services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - pgdata

  migrate:
    image: migrate/migrate:latest
    restart: on-failure
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=${DB_URL_COMPOSE}
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pgdata

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - API_PORT=${API_PORT}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_URL: ${DB_URL_COMPOSE}
      LOG_LEVEL: ${LOG_LEVEL}
      API_PORT: ${API_PORT}
    ports:
      - ${API_PORT}:${API_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - pgdata

networks:
  pgdata:
    driver: bridge
